services:
  augment-open-proxy:
    build: .
    # Mount the Augment session so the proxy can authenticate via `auggie login`.
    # Remove this volume (and set AUGMENT_API_TOKEN instead) if you prefer token auth.
    volumes:
      - ${AUGMENT_SESSION_FILE:-~/.augment/session.json}:/root/.augment/session.json:ro
    ports:
      - "${AOP_PORT:-7888}:${AOP_PORT:-7888}"
    environment:
      AOP_PORT: ${AOP_PORT:-7888}
      AOP_HOST: "0.0.0.0"
      AUGMENT_API_TOKEN: ${AUGMENT_API_TOKEN:-}
      AUGMENT_API_URL: ${AUGMENT_API_URL:-}
      AOP_DISABLE_EFFORT_MODELS: ${AOP_DISABLE_EFFORT_MODELS:-claude-opus-4-6,claude-opus-4-6-500k,claude-sonnet-4-6-500k,claude-opus-4-7-500k}
      AOP_LOGGING: ${AOP_LOGGING:-info}
      AOP_LOG_FORMAT: ${AOP_LOG_FORMAT:-text}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${AOP_PORT:-7888}/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
